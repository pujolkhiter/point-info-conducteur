<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point Info Conducteur 2.0 — KIHO | KEOLIS NORD Comines</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- 🔐 VÉRIFICATION DE CONNEXION -->
    <script>
        (function() {
            // Activer/désactiver la protection par code
            const PROTECTION_ACTIVE = true;
            
            if (PROTECTION_ACTIVE) {
                const session = sessionStorage.getItem('pic_session');
                const remember = localStorage.getItem('pic_remember');
                
                let connecte = false;
                
                if (session === 'active') {
                    connecte = true;
                } else if (remember && Date.now() < parseInt(remember)) {
                    sessionStorage.setItem('pic_session', 'active');
                    connecte = true;
                }
                
                if (!connecte) {
                    window.location.href = 'login.html';
                }
            }
        })();
    </script>
    
    <style>
        :root {
            --turquoise: #00A5BE;
            --turquoise-dark: #007A8C;
            --turquoise-light: #E0F7FA;
            --taupe: #786E5F;
            --orange: #E87C1E;
            --vert: #4CAF50;
            --vert-light: #E8F5E9;
            --rouge: #E53935;
            --rouge-light: #FFEBEE;
            --bleu: #1976D2;
            --bleu-light: #E3F2FD;
            --violet: #7B1FA2;
            --violet-light: #F3E5F5;
            --jaune: #FFC107;
            --jaune-light: #FFF8E1;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #e9ecef;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,165,190,0.25);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .kiho-badge {
            background: white;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        
        .kiho-badge .k { color: var(--turquoise); }
        .kiho-badge .iho { color: var(--taupe); }
        
        .logo-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .logo-text .subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
            margin-top: 1px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }
        
        .week-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.4rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        /* Navigation */
        .nav {
            background: white;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .nav::-webkit-scrollbar { display: none; }
        
        .nav-inner {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 0.5rem;
        }
        
        .nav-tab {
            flex-shrink: 0;
            padding: 0.9rem 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }
        
        .nav-tab:hover { color: var(--turquoise); background: #fafafa; }
        .nav-tab.active { color: var(--turquoise); border-bottom-color: var(--turquoise); }
        
        .nav-tab .badge {
            background: var(--rouge);
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }
        
        .nav-tab .badge.new { background: var(--vert); }
        
        /* Main */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem;
        }
        
        .tab-content { display: none; animation: fadeIn 0.25s ease-out; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }
        
        .section-title:first-child { margin-top: 0; }
        
        /* KIHO Axes */
        .kiho-axes {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 0.25rem;
        }
        
        .kiho-axe {
            flex: 1;
            min-width: 70px;
            padding: 0.5rem 0.4rem;
            border-radius: 8px;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        
        .kiho-axe i { font-size: 1rem; }
        
        .kiho-axe.securite { background: var(--vert); }
        .kiho-axe.qualite { background: var(--orange); }
        .kiho-axe.humain { background: var(--bleu); }
        .kiho-axe.recette { background: var(--violet); }
        .kiho-axe.pilotage { background: var(--turquoise); }
        
        /* Challenge Box */
        .challenge-box {
            background: linear-gradient(135deg, #43A047 0%, #2E7D32 100%);
            color: white;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 8px 25px rgba(76,175,80,0.25);
            position: relative;
            overflow: hidden;
        }
        
        .challenge-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -15%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        
        .challenge-content h2 {
            font-size: 1.1rem;
            margin-bottom: 0.4rem;
        }
        
        .challenge-content p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .challenge-progress {
            margin-top: 0.75rem;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        
        .challenge-fill {
            height: 100%;
            background: white;
            border-radius: 10px;
            transition: width 1s ease;
        }
        
        .challenge-counter {
            text-align: center;
            flex-shrink: 0;
        }
        
        .challenge-number {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .challenge-label {
            font-size: 0.75rem;
            opacity: 0.9;
        }
        
        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
        }
        
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        
        .kpi-card.securite::before { background: var(--vert); }
        .kpi-card.qualite::before { background: var(--orange); }
        .kpi-card.humain::before { background: var(--bleu); }
        
        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.6rem;
            font-size: 1.1rem;
        }
        
        .kpi-card.securite .kpi-icon { background: var(--vert-light); color: var(--vert); }
        .kpi-card.qualite .kpi-icon { background: #FFF3E0; color: var(--orange); }
        .kpi-card.humain .kpi-icon { background: var(--bleu-light); color: var(--bleu); }
        
        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
        }
        
        .kpi-card.securite .kpi-value { color: var(--vert); }
        .kpi-card.qualite .kpi-value { color: var(--orange); }
        .kpi-card.humain .kpi-value { color: var(--bleu); }
        
        .kpi-label {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.4rem;
        }
        
        .kpi-trend {
            font-size: 0.7rem;
            margin-top: 0.4rem;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
        }
        
        .kpi-trend.up.bad { background: var(--rouge-light); color: var(--rouge); }
        .kpi-trend.down.good { background: var(--vert-light); color: var(--vert); }
        .kpi-trend.up.good { background: var(--vert-light); color: var(--vert); }
        .kpi-trend.down.bad { background: var(--rouge-light); color: var(--rouge); }
        .kpi-trend.stable { background: #f0f0f0; color: var(--text-light); }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            margin-bottom: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .card-header {
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
        }
        
        .card-header.securite { background: linear-gradient(90deg, var(--vert-light), white); border-left: 4px solid var(--vert); }
        .card-header.qualite { background: linear-gradient(90deg, #FFF3E0, white); border-left: 4px solid var(--orange); }
        .card-header.humain { background: linear-gradient(90deg, var(--bleu-light), white); border-left: 4px solid var(--bleu); }
        .card-header.video { background: linear-gradient(90deg, var(--rouge-light), white); border-left: 4px solid var(--rouge); }
        
        .card-body { padding: 0; }
        
        /* Info Items */
        .info-item {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }
        
        .info-item:last-child { border-bottom: none; }
        
        .info-item.critique {
            background: linear-gradient(90deg, var(--rouge-light), white);
            border-left: 4px solid var(--rouge);
        }
        
        .info-item.urgent {
            background: linear-gradient(90deg, var(--jaune-light), white);
            border-left: 4px solid var(--orange);
        }
        
        .info-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .info-icon.vert { background: var(--vert-light); color: var(--vert); }
        .info-icon.orange { background: #FFF3E0; color: var(--orange); }
        .info-icon.rouge { background: var(--rouge-light); color: var(--rouge); }
        .info-icon.bleu { background: var(--bleu-light); color: var(--bleu); }
        
        .info-content { flex: 1; min-width: 0; }
        .info-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .info-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.4; }
        .info-date { font-size: 0.75rem; color: var(--text-light); margin-top: 0.3rem; }
        
        .info-reactions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        
        .reaction-btn {
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-light);
        }
        
        .reaction-btn:hover { background: #f8f9fa; border-color: var(--turquoise); color: var(--turquoise); }
        
        /* Videos */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 0.75rem;
        }
        
        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .video-thumb {
            position: relative;
            padding-top: 56.25%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .video-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--rouge);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .video-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--vert);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
        }
        
        .video-info { padding: 0.75rem; }
        .video-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .video-source { font-size: 0.75rem; color: var(--text-light); }
        
        /* Team */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
        }
        
        .team-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        
        .team-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
        }
        
        .team-name { font-weight: 600; font-size: 0.9rem; }
        .team-role { font-size: 0.8rem; color: var(--text-light); }
        
        .team-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            margin-top: 0.4rem;
            font-weight: 600;
        }
        
        .team-badge.stagiaire { background: var(--violet-light); color: var(--violet); }
        .team-badge.exploitant { background: var(--bleu-light); color: var(--bleu); }
        .team-badge.chef { background: #FFF3E0; color: var(--orange); }
        
        /* Polls */
        .poll-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        
        .poll-question { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.75rem; }
        
        .poll-option {
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.4rem;
        }
        
        .poll-option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }
        
        .poll-option-text { font-weight: 500; font-size: 0.85rem; }
        .poll-option-pct { font-size: 0.85rem; color: var(--turquoise); font-weight: 600; }
        
        .poll-bar {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .poll-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--turquoise), var(--turquoise-dark));
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .poll-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.75rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }
        
        /* Suggestions */
        .suggestion-item {
            padding: 0.9rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            background: white;
        }
        
        .suggestion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .suggestion-author {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .suggestion-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .suggestion-status.nouveau { background: var(--bleu-light); color: var(--bleu); }
        .suggestion-status.en_cours { background: #FFF3E0; color: var(--orange); }
        .suggestion-status.traite { background: var(--vert-light); color: var(--vert); }
        
        .suggestion-text { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
        
        .suggestion-response {
            background: #f8f9fa;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            margin-top: 0.6rem;
            border-left: 3px solid var(--turquoise);
            font-size: 0.85rem;
        }
        
        .suggestion-response strong { color: var(--turquoise); }
        
        /* Emergency */
        .emergency-card {
            background: linear-gradient(135deg, var(--rouge) 0%, #C62828 100%);
            color: white;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        
        .emergency-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .emergency-content { flex: 1; }
        .emergency-content h3 { font-size: 0.9rem; }
        .emergency-content p { font-size: 0.8rem; opacity: 0.9; }
        .emergency-phone { font-size: 1.2rem; font-weight: 700; flex-shrink: 0; }
        
        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            color: var(--text-light);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--turquoise);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-box {
            background: var(--rouge-light);
            border: 1px solid var(--rouge);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            max-width: 500px;
            margin: 2rem auto;
        }
        
        .error-box h2 { color: var(--rouge); margin-bottom: 0.5rem; }
        .error-box p { color: var(--text-light); font-size: 0.9rem; }
        
        /* Mobile */
        @media (max-width: 600px) {
            .header-top { padding: 0.75rem 1rem; }
            .logo-text h1 { font-size: 0.95rem; }
            .header-right { gap: 0.5rem; }
            .live-indicator, .week-badge { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
            .nav-tab { padding: 0.75rem; font-size: 0.8rem; }
            .main { padding: 1rem; }
            .challenge-box { flex-direction: column; text-align: center; padding: 1rem; }
            .challenge-number { font-size: 2.5rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .kiho-axe { min-width: 60px; padding: 0.4rem 0.3rem; font-size: 0.65rem; }
            .kiho-axe i { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="logo-section">
                <div class="kiho-badge"><span class="k">K</span><span class="iho">IHO</span></div>
                <div class="logo-text">
                    <h1>📋 Point Info Conducteur</h1>
                    <div class="subtitle" id="headerSubtitle">Chargement...</div>
                </div>
            </div>
            <div class="header-right">
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span>En direct</span>
                </div>
                <div class="week-badge" id="weekBadge">S--</div>
                <button onclick="deconnexion()" title="Se déconnecter" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer;opacity:0.8;margin-left:10px;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>
    
    <nav class="nav">
        <div class="nav-inner">
            <button class="nav-tab active" data-tab="dashboard"><i class="fas fa-home"></i> Accueil</button>
            <button class="nav-tab" data-tab="securite"><i class="fas fa-shield-alt"></i> Sécurité</button>
            <button class="nav-tab" data-tab="qualite"><i class="fas fa-star"></i> Qualité <span class="badge" id="alertBadge">0</span></button>
            <button class="nav-tab" data-tab="videos"><i class="fas fa-video"></i> Vidéos <span class="badge new" id="videoBadge">0</span></button>
            <button class="nav-tab" data-tab="equipe"><i class="fas fa-users"></i> Équipe</button>
            <button class="nav-tab" data-tab="sondages"><i class="fas fa-poll"></i> Sondages</button>
        </div>
    </nav>
    
    <main class="main">
        <div id="loadingScreen" class="loading">
            <div class="loading-spinner"></div>
            <div>Chargement des données...</div>
        </div>
        
        <div id="errorScreen" class="error-box" style="display: none;">
            <h2>⚠️ Erreur de chargement</h2>
            <p>Le fichier <strong>donnees.js</strong> n'a pas été trouvé.<br>Assurez-vous qu'il est dans le même dossier que cette page.</p>
        </div>
        
        <div id="appContent" style="display: none;">
            <div class="tab-content active" id="dashboard"></div>
            <div class="tab-content" id="securite"></div>
            <div class="tab-content" id="qualite"></div>
            <div class="tab-content" id="videos"></div>
            <div class="tab-content" id="equipe"></div>
            <div class="tab-content" id="sondages"></div>
        </div>
    </main>

    <!-- Chargement du fichier de données -->
    <script src="donnees.js"></script>
    
    <script>
        // Attendre que les données soient chargées
        function init() {
            if (typeof DONNEES_PIC === 'undefined') {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'block';
                return;
            }
            
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            
            renderApp();
            initNavigation();
        }
        
        function renderApp() {
            const D = DONNEES_PIC;
            
            // Header
            document.getElementById('headerSubtitle').textContent = 
                `KEOLIS NORD — Dépôt ${D.parametres.depot} • ${D.parametres.effectif_total} conducteurs`;
            document.getElementById('weekBadge').textContent = `S${D.parametres.semaine}`;
            
            // Badges
            const alertCount = D.alertes.filter(a => a.actif).length;
            const videoCount = D.videos.filter(v => v.nouveau && v.actif).length;
            document.getElementById('alertBadge').textContent = alertCount;
            document.getElementById('videoBadge').textContent = videoCount;
            
            renderDashboard(D);
            renderSecurite(D);
            renderQualite(D);
            renderVideos(D);
            renderEquipe(D);
            renderSondages(D);
        }
        
        function renderDashboard(D) {
            const defi = D.defi_100_jours;
            const progress = Math.min(defi.jours_actuels, 100);
            
            let html = `
                <div class="kiho-axes">
                    <div class="kiho-axe securite"><i class="fas fa-shield-alt"></i>Sécurité</div>
                    <div class="kiho-axe qualite"><i class="fas fa-star"></i>Qualité</div>
                    <div class="kiho-axe humain"><i class="fas fa-users"></i>Humain</div>
                    <div class="kiho-axe recette"><i class="fas fa-euro-sign"></i>Recettes</div>
                    <div class="kiho-axe pilotage"><i class="fas fa-chart-pie"></i>Pilotage</div>
                </div>
            `;
            
            if (defi.actif) {
                html += `
                    <div class="challenge-box">
                        <div class="challenge-content">
                            <h2>🎯 Défi 100 Jours Sans Accident</h2>
                            <p>Ensemble, relevons ce défi pour la sécurité de tous !</p>
                            <div class="challenge-progress"><div class="challenge-fill" style="width: ${progress}%"></div></div>
                            <p style="margin-top: 0.4rem; font-size: 0.8rem; opacity: 0.85;">Plus que ${100 - defi.jours_actuels} jours ! 💪</p>
                        </div>
                        <div class="challenge-counter">
                            <div class="challenge-number">${defi.jours_actuels}</div>
                            <div class="challenge-label">jours consécutifs</div>
                        </div>
                    </div>
                `;
            }
            
            html += `<div class="section-title">📊 Indicateurs KIHO</div><div class="kpi-grid">`;
            
            D.kpi.forEach(k => {
                const diff = k.valeur - k.valeur_semaine_precedente;
                const diffText = diff > 0 ? `+${diff}` : (diff < 0 ? `${diff}` : '=');
                const trendIcon = k.tendance === 'up' ? 'fa-arrow-up' : (k.tendance === 'down' ? 'fa-arrow-down' : 'fa-equals');
                
                // Déterminer si la tendance est bonne ou mauvaise
                const badKpis = ['Accidents', 'Retards PS', 'CNE Exploitation', 'Réclamations', 'Erreurs SAE', 'Absences'];
                const isBadKpi = badKpis.includes(k.nom);
                const trendClass = k.tendance === 'stable' ? 'stable' : 
                    (k.tendance === 'up' ? (isBadKpi ? 'up bad' : 'up good') : (isBadKpi ? 'down good' : 'down bad'));
                
                html += `
                    <div class="kpi-card ${k.categorie}">
                        <div class="kpi-icon"><i class="fas ${k.icone}"></i></div>
                        <div class="kpi-value">${k.valeur}</div>
                        <div class="kpi-label">${k.nom}</div>
                        <div class="kpi-trend ${trendClass}"><i class="fas ${trendIcon}"></i> ${diffText}</div>
                    </div>
                `;
            });
            
            html += `</div><div class="section-title">⚡ Alertes du moment</div><div class="card"><div class="card-body">`;
            
            D.alertes.filter(a => a.actif).forEach(a => {
                const iconClass = a.priorite === 'critique' ? 'rouge' : (a.priorite === 'urgent' ? 'orange' : 'bleu');
                html += `
                    <div class="info-item ${a.priorite}">
                        <div class="info-icon ${iconClass}"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="info-content">
                            <div class="info-title">${a.titre}</div>
                            <div class="info-desc">${a.description}</div>
                        </div>
                    </div>
                `;
            });
            
            html += `
                </div></div>
                <div class="emergency-card">
                    <div class="emergency-icon"><i class="fas fa-phone-alt"></i></div>
                    <div class="emergency-content">
                        <h3>Contact Exploitation Urgence</h3>
                        <p>24h/24 - 7j/7</p>
                    </div>
                    <div class="emergency-phone">${D.parametres.contact_urgence}</div>
                </div>
            `;
            
            document.getElementById('dashboard').innerHTML = html;
        }
        
        function renderSecurite(D) {
            const defi = D.defi_100_jours;
            
            let html = '';
            
            if (defi.actif) {
                html += `
                    <div class="challenge-box">
                        <div class="challenge-content">
                            <h2>🎯 Défi 100 Jours Sans Accident</h2>
                            <div class="challenge-progress"><div class="challenge-fill" style="width: ${Math.min(defi.jours_actuels, 100)}%"></div></div>
                        </div>
                        <div class="challenge-counter">
                            <div class="challenge-number">${defi.jours_actuels}</div>
                            <div class="challenge-label">jours sans AT</div>
                        </div>
                    </div>
                `;
            }
            
            html += `<div class="card"><div class="card-header securite">🦺 Safety Moments de la semaine</div><div class="card-body">`;
            
            D.safety_moments.filter(s => s.actif).forEach(s => {
                html += `
                    <div class="info-item">
                        <div class="info-icon vert"><i class="fas fa-check-circle"></i></div>
                        <div class="info-content">
                            <div class="info-title">${s.titre}</div>
                            <div class="info-desc">${s.description}</div>
                            <div class="info-reactions">
                                <button class="reaction-btn"><i class="fas fa-thumbs-up"></i> ${s.reactions}</button>
                                <button class="reaction-btn"><i class="fas fa-comment"></i> ${s.commentaires}</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            document.getElementById('securite').innerHTML = html;
        }
        
        function renderQualite(D) {
            let html = `<div class="card"><div class="card-header qualite">⚠️ Alertes & Consignes</div><div class="card-body">`;
            
            D.alertes.filter(a => a.actif).forEach(a => {
                const iconClass = a.priorite === 'critique' ? 'rouge' : (a.priorite === 'urgent' ? 'orange' : 'bleu');
                html += `
                    <div class="info-item ${a.priorite}">
                        <div class="info-icon ${iconClass}"><i class="fas fa-exclamation-circle"></i></div>
                        <div class="info-content">
                            <div class="info-title">${a.titre}</div>
                            <div class="info-desc">${a.description}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            document.getElementById('qualite').innerHTML = html;
        }
        
        function renderVideos(D) {
            let html = `<div class="section-title">🎬 Vidéos Sécurité & Formation</div><div class="video-grid">`;
            
            D.videos.filter(v => v.actif).forEach(v => {
                html += `
                    <div class="video-card" onclick="window.open('${v.url}', '_blank')">
                        <div class="video-thumb">
                            ${v.nouveau ? '<div class="video-tag">Nouveau</div>' : ''}
                            <div class="video-play"><i class="fas fa-play"></i></div>
                            <div class="video-duration">${v.duree}</div>
                        </div>
                        <div class="video-info">
                            <div class="video-title">${v.titre}</div>
                            <div class="video-source"><i class="fas fa-building"></i> ${v.source}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('videos').innerHTML = html;
        }
        
        function renderEquipe(D) {
            let html = `<div class="section-title">👥 Équipe Exploitation Comines</div><div class="team-grid">`;
            
            D.equipe.filter(e => e.actif).forEach(e => {
                const initials = (e.prenom[0] || '') + (e.nom[0] || '');
                html += `
                    <div class="team-card">
                        <div class="team-avatar" style="background: ${e.couleur}">${initials.toUpperCase()}</div>
                        <div class="team-name">${e.prenom} ${e.nom}</div>
                        <div class="team-role">${e.role}</div>
                        <span class="team-badge ${e.badge}">${e.role}</span>
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('equipe').innerHTML = html;
        }
        
        function renderSondages(D) {
            let html = `<div class="section-title">📊 Sondages en cours</div>`;
            
            D.sondages.filter(s => s.statut === 'actif').forEach(s => {
                const totalVotes = s.options.reduce((sum, o) => sum + o.votes, 0) || 1;
                
                html += `<div class="poll-card"><div class="poll-question">${s.question}</div>`;
                
                s.options.forEach(o => {
                    const pct = Math.round(o.votes / totalVotes * 100);
                    html += `
                        <div class="poll-option">
                            <div class="poll-option-header">
                                <span class="poll-option-text">${o.texte}</span>
                                <span class="poll-option-pct">${pct}%</span>
                            </div>
                            <div class="poll-bar"><div class="poll-fill" style="width: ${pct}%"></div></div>
                        </div>
                    `;
                });
                
                html += `
                    <div class="poll-meta">
                        <span><i class="fas fa-users"></i> ${totalVotes} votes</span>
                        <span><i class="fas fa-calendar"></i> Jusqu'au ${formatDate(s.date_fin)}</span>
                    </div>
                </div>`;
            });
            
            html += `<div class="section-title" style="margin-top: 1.5rem;">💡 Boîte à idées</div>`;
            
            D.suggestions.forEach(s => {
                const statusText = s.statut === 'traite' ? '✓ Traité' : (s.statut === 'en_cours' ? '⏳ En cours' : '🆕 Nouveau');
                html += `
                    <div class="suggestion-item">
                        <div class="suggestion-header">
                            <span class="suggestion-author">${s.auteur}</span>
                            <span class="suggestion-status ${s.statut}">${statusText}</span>
                        </div>
                        <div class="suggestion-text">${s.texte}</div>
                        ${s.reponse ? `<div class="suggestion-response"><strong>Réponse :</strong> ${s.reponse}</div>` : ''}
                    </div>
                `;
            });
            
            document.getElementById('sondages').innerHTML = html;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
        }
        
        function initNavigation() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }
        
        // 🔐 Fonction de déconnexion
        function deconnexion() {
            if (confirm('Voulez-vous vous déconnecter ?')) {
                sessionStorage.removeItem('pic_session');
                localStorage.removeItem('pic_remember');
                window.location.href = 'login.html';
            }
        }
        
        // Démarrage
        setTimeout(init, 100);
    </script>
</body>
</html>

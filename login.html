<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion — Point Info Conducteur | KEOLIS NORD</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --turquoise: #00A5BE;
            --turquoise-dark: #007A8C;
            --orange: #E87C1E;
            --rouge: #E53935;
            --vert: #4CAF50;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--turquoise), var(--turquoise-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        h1 {
            color: var(--turquoise-dark);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        .depot-badge {
            display: inline-block;
            background: var(--turquoise-dark);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 25px;
        }
        
        .pin-label {
            color: #555;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .pin-input {
            width: 55px;
            height: 65px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            color: var(--turquoise-dark);
            transition: all 0.2s;
            -webkit-text-security: disc;
        }
        
        .pin-input:focus {
            outline: none;
            border-color: var(--turquoise);
            box-shadow: 0 0 0 3px rgba(0, 165, 190, 0.2);
        }
        
        .pin-input.error {
            border-color: var(--rouge);
            animation: shake 0.5s;
        }
        
        .pin-input.success {
            border-color: var(--vert);
            background: #E8F5E9;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        .error-message {
            color: var(--rouge);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .error-message.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .remember-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            color: #666;
            font-size: 0.85rem;
        }
        
        .remember-container input {
            width: 18px;
            height: 18px;
            accent-color: var(--turquoise);
        }
        
        .loading {
            display: none;
            color: var(--turquoise);
            font-size: 0.9rem;
        }
        
        .loading.show {
            display: block;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #eee;
            border-top-color: var(--turquoise);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #aaa;
            font-size: 0.75rem;
        }
        
        .footer a {
            color: var(--turquoise);
            text-decoration: none;
        }
        
        .attempts-warning {
            background: #FFF3E0;
            color: var(--orange);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .attempts-warning.show {
            display: block;
        }
        
        .blocked {
            background: #FFEBEE;
            color: var(--rouge);
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .blocked.show {
            display: block;
        }
        
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 240px;
            margin: 0 auto 20px;
        }
        
        .numpad-btn {
            padding: 15px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            background: #f5f5f5;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .numpad-btn:hover {
            background: var(--turquoise-dark);
            color: white;
        }
        
        .numpad-btn:active {
            transform: scale(0.95);
        }
        
        .numpad-btn.action {
            background: var(--turquoise);
            color: white;
        }
        
        @media (min-width: 500px) {
            .numpad { display: none; }
        }
    </style>
</head>

        <h1>Point Info Conducteur</h1>
        <p class="subtitle">KEOLIS NORD</p>
        <div class="depot-badge">📍 Dépôt Comines</div>
        
        <p class="pin-label">Entrez le code d'accès</p>
        
        <div class="pin-container">
            <input type="tel" class="pin-input" maxlength="1" id="pin1" inputmode="numeric" autocomplete="off">
            <input type="tel" class="pin-input" maxlength="1" id="pin2" inputmode="numeric" autocomplete="off">
            <input type="tel" class="pin-input" maxlength="1" id="pin3" inputmode="numeric" autocomplete="off">
            <input type="tel" class="pin-input" maxlength="1" id="pin4" inputmode="numeric" autocomplete="off">
        </div>
        
        <p class="error-message" id="errorMsg">❌ Code incorrect</p>
        
        <div class="attempts-warning" id="attemptsWarning">
            ⚠️ Attention : <span id="attemptsLeft">3</span> tentative(s) restante(s)
        </div>
        
        <div class="blocked" id="blockedMsg">
            🔒 Trop de tentatives. Réessayez dans <span id="blockedTime">60</span> secondes.
        </div>
        
        <div class="loading" id="loadingMsg">
            <span class="loading-spinner"></span> Connexion...
        </div>
        
        <!-- Clavier numérique pour mobile -->
        <div class="numpad" id="numpad">
            <button class="numpad-btn" onclick="addDigit('1')">1</button>
            <button class="numpad-btn" onclick="addDigit('2')">2</button>
            <button class="numpad-btn" onclick="addDigit('3')">3</button>
            <button class="numpad-btn" onclick="addDigit('4')">4</button>
            <button class="numpad-btn" onclick="addDigit('5')">5</button>
            <button class="numpad-btn" onclick="addDigit('6')">6</button>
            <button class="numpad-btn" onclick="addDigit('7')">7</button>
            <button class="numpad-btn" onclick="addDigit('8')">8</button>
            <button class="numpad-btn" onclick="addDigit('9')">9</button>
            <button class="numpad-btn action" onclick="clearPins()">C</button>
            <button class="numpad-btn" onclick="addDigit('0')">0</button>
            <button class="numpad-btn action" onclick="removeDigit()">←</button>
        </div>
        
        <label class="remember-container">
            <input type="checkbox" id="rememberMe">
            Rester connecté 7 jours
        </label>
        
        <div class="footer">
            <p>© 2026 KEOLIS NORD</p>
            <p style="margin-top:8px;"><a href="admin.html">🔧 Accès exploitation</a></p>
        </div>
    </div>

    <script>
        // 🔥 FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCpWe_Bb5R6X-xUBW-1JbAhtWhEeBfA5m4",
            authDomain: "point-info-conducteur.firebaseapp.com",
            databaseURL: "https://point-info-conducteur-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "point-info-conducteur",
            storageBucket: "point-info-conducteur.firebasestorage.app",
            messagingSenderId: "131293131118",
            appId: "1:131293131118:web:7076f0101418ceaf49517f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Code chargé depuis Firebase uniquement
        let CODE_CONDUCTEUR = null;
        let codeLoaded = false;
        
        // Charger le code depuis Firebase
        db.ref('donnees/codes/conducteur').once('value').then(snap => {
            if (snap.exists()) {
                CODE_CONDUCTEUR = snap.val();
            }
            codeLoaded = true;
        }).catch(() => {
            codeLoaded = true;
        });
        
        const MAX_ATTEMPTS = 5;
        const BLOCK_TIME = 60; // secondes
        
        let attempts = parseInt(localStorage.getItem('pic_attempts') || '0');
        let blockedUntil = parseInt(localStorage.getItem('pic_blocked') || '0');
        
        const pins = [
            document.getElementById('pin1'),
            document.getElementById('pin2'),
            document.getElementById('pin3'),
            document.getElementById('pin4')
        ];
        
        // Vérifier si déjà connecté
        (function checkSession() {
            const session = sessionStorage.getItem('pic_session');
            const remember = localStorage.getItem('pic_remember');
            
            if (session === 'active') {
                window.location.href = 'index.html';
            } else if (remember && Date.now() < parseInt(remember)) {
                sessionStorage.setItem('pic_session', 'active');
                window.location.href = 'index.html';
            }
        })();
        
        // Vérifier blocage
        function checkBlocked() {
            if (Date.now() < blockedUntil) {
                showBlocked();
                return true;
            } else if (blockedUntil > 0) {
                // Déblocage
                blockedUntil = 0;
                attempts = 0;
                localStorage.setItem('pic_attempts', '0');
                localStorage.setItem('pic_blocked', '0');
            }
            return false;
        }
        
        function showBlocked() {
            const remaining = Math.ceil((blockedUntil - Date.now()) / 1000);
            document.getElementById('blockedMsg').classList.add('show');
            document.getElementById('blockedTime').textContent = remaining;
            pins.forEach(p => p.disabled = true);
            
            if (remaining > 0) {
                setTimeout(showBlocked, 1000);
            } else {
                document.getElementById('blockedMsg').classList.remove('show');
                pins.forEach(p => p.disabled = false);
                attempts = 0;
                localStorage.setItem('pic_attempts', '0');
                localStorage.setItem('pic_blocked', '0');
                pins[0].focus();
            }
        }
        
        // Gestion des inputs
        pins.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (checkBlocked()) return;
                
                // Ne garder que les chiffres
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                // Passer au suivant
                if (e.target.value && index < 3) {
                    pins[index + 1].focus();
                }
                
                // Vérifier si complet
                if (index === 3 && e.target.value) {
                    verifierCode();
                }
                
                // Reset style erreur
                e.target.classList.remove('error');
                document.getElementById('errorMsg').classList.remove('show');
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    pins[index - 1].focus();
                }
            });
            
            input.addEventListener('focus', () => {
                e.target.select();
            });
        });
        
        // Clavier numérique mobile
        function addDigit(digit) {
            if (checkBlocked()) return;
            
            for (let i = 0; i < 4; i++) {
                if (!pins[i].value) {
                    pins[i].value = digit;
                    pins[i].classList.remove('error');
                    if (i === 3) {
                        verifierCode();
                    } else {
                        pins[i + 1].focus();
                    }
                    break;
                }
            }
        }
        
        function removeDigit() {
            for (let i = 3; i >= 0; i--) {
                if (pins[i].value) {
                    pins[i].value = '';
                    pins[i].focus();
                    break;
                }
            }
        }
        
        function clearPins() {
            pins.forEach(p => {
                p.value = '';
                p.classList.remove('error', 'success');
            });
            pins[0].focus();
            document.getElementById('errorMsg').classList.remove('show');
        }
        
        // Vérification
        function verifierCode() {
            const code = pins.map(p => p.value).join('');
            
            document.getElementById('loadingMsg').classList.add('show');
            
            // Attendre que le code soit chargé depuis Firebase
            const checkCode = () => {
                if (!codeLoaded) {
                    setTimeout(checkCode, 100);
                    return;
                }
                
                document.getElementById('loadingMsg').classList.remove('show');
                
                if (CODE_CONDUCTEUR && code === CODE_CONDUCTEUR) {
                    // Succès !
                    pins.forEach(p => p.classList.add('success'));
                    
                    sessionStorage.setItem('pic_session', 'active');
                    
                    if (document.getElementById('rememberMe').checked) {
                        const expires = Date.now() + (7 * 24 * 60 * 60 * 1000); // 7 jours
                        localStorage.setItem('pic_remember', expires.toString());
                    }
                    
                    // Reset tentatives
                    localStorage.setItem('pic_attempts', '0');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                    
                } else {
                    // Échec
                    attempts++;
                    localStorage.setItem('pic_attempts', attempts.toString());
                    
                    pins.forEach(p => {
                        p.classList.add('error');
                        p.value = '';
                    });
                    
                    document.getElementById('errorMsg').classList.add('show');
                    
                    if (attempts >= MAX_ATTEMPTS) {
                        // Bloquer
                        blockedUntil = Date.now() + (BLOCK_TIME * 1000);
                        localStorage.setItem('pic_blocked', blockedUntil.toString());
                        showBlocked();
                    } else if (attempts >= MAX_ATTEMPTS - 2) {
                        // Avertissement
                        document.getElementById('attemptsWarning').classList.add('show');
                        document.getElementById('attemptsLeft').textContent = MAX_ATTEMPTS - attempts;
                    }
                    
                    pins[0].focus();
                }
            };
            
            checkCode();
        }
        
        // Init
        checkBlocked();
        if (!checkBlocked()) {
            pins[0].focus();
            
            if (attempts >= MAX_ATTEMPTS - 2 && attempts < MAX_ATTEMPTS) {
                document.getElementById('attemptsWarning').classList.add('show');
                document.getElementById('attemptsLeft').textContent = MAX_ATTEMPTS - attempts;
            }
        }
    </script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Connexion — Point Info Conducteur | KEOLIS NORD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --turquoise: #00A5BE;
            --turquoise-dark: #007A8C;
            --turquoise-light: #B3E0E6;
            --taupe: #786E5F;
            --orange: #E87C1E;
            --blanc: #FFFFFF;
            --gris-clair: #F2F2F2;
            --noir: #333333;
            --vert: #28a745;
            --rouge: #dc3545;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 50%, var(--taupe) 100%);
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header .logo {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .login-header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .login-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .pin-label {
            display: block;
            text-align: center;
            color: var(--taupe);
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .pin-input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            border: 3px solid var(--gris-clair);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            color: var(--turquoise-dark);
        }
        
        .pin-input:focus {
            border-color: var(--turquoise);
            box-shadow: 0 0 0 4px rgba(0, 165, 190, 0.2);
        }
        
        .pin-input.error {
            border-color: var(--rouge);
            animation: shake 0.5s ease;
        }
        
        .pin-input.success {
            border-color: var(--vert);
            background: #e8f5e9;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--taupe);
            font-size: 0.9rem;
        }
        
        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--turquoise);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 165, 190, 0.4);
        }
        
        .btn-login:disabled {
            background: var(--gris);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .error-message {
            background: #ffebee;
            color: var(--rouge);
            padding: 12px 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
        
        .error-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .login-footer {
            text-align: center;
            padding: 20px 30px 30px;
            border-top: 1px solid var(--gris-clair);
            color: var(--gris);
            font-size: 0.8rem;
        }
        
        .login-footer a {
            color: var(--turquoise);
            text-decoration: none;
        }
        
        /* Numeric keypad for mobile */
        .keypad {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        
        @media (max-width: 500px) {
            .keypad { display: grid; }
            .pin-input { 
                width: 50px; 
                height: 55px; 
                font-size: 1.5rem;
                /* Disable keyboard on mobile */
                -webkit-user-select: none;
            }
        }
        
        .key-btn {
            padding: 18px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid var(--gris-clair);
            border-radius: 12px;
            background: white;
            color: var(--noir);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .key-btn:hover, .key-btn:active {
            background: var(--turquoise-light);
            border-color: var(--turquoise);
        }
        
        .key-btn.delete {
            color: var(--rouge);
        }
        
        .key-btn.empty {
            visibility: hidden;
        }
        
        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-login.loading .spinner { display: inline-block; }
        .btn-login.loading .btn-text { display: none; }
        
        /* Attempts counter */
        .attempts-warning {
            background: #fff3e0;
            color: var(--orange);
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            display: none;
        }
        
        .attempts-warning.show { display: block; }
        
        /* Success state */
        .login-container.success .login-header {
            background: linear-gradient(135deg, var(--vert) 0%, #1b5e20 100%);
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginContainer">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-bus"></i>
            </div>
            <h1>Point Info Conducteur 2.0</h1>
            <p>KEOLIS NORD — Dépôt Comines</p>
        </div>
        
        <div class="login-body">
            <label class="pin-label">
                <i class="fas fa-lock"></i> Entrez le code d'accès
            </label>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> Code incorrect. Veuillez réessayer.
            </div>
            
            <div class="attempts-warning" id="attemptsWarning">
                <i class="fas fa-exclamation-triangle"></i> 
                <span id="attemptsText">Plus que 2 tentatives</span>
            </div>
            
            <div class="pin-container">
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" id="pin1" autofocus>
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" id="pin2">
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" id="pin3">
                <input type="password" class="pin-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" id="pin4">
            </div>
            
            <!-- Mobile keypad -->
            <div class="keypad" id="keypad">
                <button class="key-btn" data-key="1">1</button>
                <button class="key-btn" data-key="2">2</button>
                <button class="key-btn" data-key="3">3</button>
                <button class="key-btn" data-key="4">4</button>
                <button class="key-btn" data-key="5">5</button>
                <button class="key-btn" data-key="6">6</button>
                <button class="key-btn" data-key="7">7</button>
                <button class="key-btn" data-key="8">8</button>
                <button class="key-btn" data-key="9">9</button>
                <button class="key-btn empty"></button>
                <button class="key-btn" data-key="0">0</button>
                <button class="key-btn delete" data-key="delete"><i class="fas fa-backspace"></i></button>
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Rester connecté sur cet appareil</label>
            </div>
            
            <button class="btn-login" id="btnLogin" onclick="validatePin()">
                <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Accéder</span>
                <div class="spinner"></div>
            </button>
        </div>
        
        <div class="login-footer">
            <p>Accès réservé aux conducteurs KEOLIS NORD</p>
            <p style="margin-top: 8px;">
                <a href="tel:0320XXXXXX"><i class="fas fa-phone"></i> Besoin d'aide ?</a>
            </p>
        </div>
    </div>

    <script>
        // ╔══════════════════════════════════════════════════════════════════════════════╗
        // ║  CONFIGURATION — MODIFIEZ CES VALEURS                                        ║
        // ╚══════════════════════════════════════════════════════════════════════════════╝
        
        const CONFIG = {
            // 🔐 CODE D'ACCÈS (4 chiffres) — Changez-le régulièrement !
            CODE_PIN: "2026",
            
            // ⏱️ Durée de validité "Rester connecté" (en jours)
            DUREE_CONNEXION_JOURS: 7,
            
            // 🚫 Nombre max de tentatives avant blocage
            MAX_TENTATIVES: 5,
            
            // ⏳ Durée du blocage après échecs (en minutes)
            DUREE_BLOCAGE_MINUTES: 15,
            
            // 🔗 Page de destination après connexion
            PAGE_DESTINATION: "index.html"
        };

        // ══════════════════════════════════════════════════════════════════════════════
        // VARIABLES
        // ══════════════════════════════════════════════════════════════════════════════
        
        const pinInputs = [
            document.getElementById('pin1'),
            document.getElementById('pin2'),
            document.getElementById('pin3'),
            document.getElementById('pin4')
        ];
        
        let tentatives = parseInt(localStorage.getItem('pic_tentatives') || '0');
        let blocageJusqua = parseInt(localStorage.getItem('pic_blocage') || '0');

        // ══════════════════════════════════════════════════════════════════════════════
        // VÉRIFICATION CONNEXION EXISTANTE
        // ══════════════════════════════════════════════════════════════════════════════
        
        function verifierConnexionExistante() {
            const session = sessionStorage.getItem('pic_session');
            const remember = localStorage.getItem('pic_remember');
            
            // Session active
            if (session === 'active') {
                redirigerVersApp();
                return;
            }
            
            // "Rester connecté" actif et non expiré
            if (remember) {
                const expiration = parseInt(remember);
                if (Date.now() < expiration) {
                    sessionStorage.setItem('pic_session', 'active');
                    redirigerVersApp();
                    return;
                } else {
                    localStorage.removeItem('pic_remember');
                }
            }
            
            // Vérifier blocage
            if (Date.now() < blocageJusqua) {
                const minutesRestantes = Math.ceil((blocageJusqua - Date.now()) / 60000);
                afficherErreur(`Trop de tentatives. Réessayez dans ${minutesRestantes} min.`);
                desactiverFormulaire();
            }
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // GESTION DES INPUTS PIN
        // ══════════════════════════════════════════════════════════════════════════════
        
        pinInputs.forEach((input, index) => {
            // Avancer automatiquement
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                
                // Ne garder que les chiffres
                e.target.value = value.replace(/[^0-9]/g, '');
                
                if (e.target.value && index < 3) {
                    pinInputs[index + 1].focus();
                }
                
                // Réinitialiser les erreurs
                resetErrors();
                
                // Auto-valider si 4 chiffres
                if (getPin().length === 4) {
                    validatePin();
                }
            });
            
            // Retour arrière
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    pinInputs[index - 1].focus();
                }
                if (e.key === 'Enter') {
                    validatePin();
                }
            });
            
            // Coller un code complet
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 4);
                
                pastedData.split('').forEach((char, i) => {
                    if (pinInputs[i]) {
                        pinInputs[i].value = char;
                    }
                });
                
                if (pastedData.length === 4) {
                    validatePin();
                }
            });
        });

        // ══════════════════════════════════════════════════════════════════════════════
        // KEYPAD MOBILE
        // ══════════════════════════════════════════════════════════════════════════════
        
        document.querySelectorAll('.key-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.key;
                
                if (key === 'delete') {
                    // Effacer le dernier chiffre
                    for (let i = 3; i >= 0; i--) {
                        if (pinInputs[i].value) {
                            pinInputs[i].value = '';
                            pinInputs[i].focus();
                            break;
                        }
                    }
                } else {
                    // Ajouter un chiffre
                    for (let i = 0; i < 4; i++) {
                        if (!pinInputs[i].value) {
                            pinInputs[i].value = key;
                            if (i < 3) pinInputs[i + 1].focus();
                            break;
                        }
                    }
                    
                    // Auto-valider si 4 chiffres
                    if (getPin().length === 4) {
                        setTimeout(() => validatePin(), 200);
                    }
                }
                
                resetErrors();
            });
        });

        // ══════════════════════════════════════════════════════════════════════════════
        // VALIDATION
        // ══════════════════════════════════════════════════════════════════════════════
        
        function getPin() {
            return pinInputs.map(input => input.value).join('');
        }
        
        function validatePin() {
            const pin = getPin();
            const btn = document.getElementById('btnLogin');
            
            if (pin.length !== 4) return;
            
            // Vérifier blocage
            if (Date.now() < blocageJusqua) {
                const minutesRestantes = Math.ceil((blocageJusqua - Date.now()) / 60000);
                afficherErreur(`Trop de tentatives. Réessayez dans ${minutesRestantes} min.`);
                return;
            }
            
            // Animation chargement
            btn.classList.add('loading');
            btn.disabled = true;
            
            setTimeout(() => {
                if (pin === CONFIG.CODE_PIN) {
                    // ✅ Succès
                    connexionReussie();
                } else {
                    // ❌ Échec
                    connexionEchouee();
                }
                
                btn.classList.remove('loading');
                btn.disabled = false;
            }, 800);
        }
        
        function connexionReussie() {
            // Réinitialiser les tentatives
            tentatives = 0;
            localStorage.setItem('pic_tentatives', '0');
            localStorage.removeItem('pic_blocage');
            
            // Créer la session
            sessionStorage.setItem('pic_session', 'active');
            
            // "Rester connecté"
            if (document.getElementById('rememberMe').checked) {
                const expiration = Date.now() + (CONFIG.DUREE_CONNEXION_JOURS * 24 * 60 * 60 * 1000);
                localStorage.setItem('pic_remember', expiration.toString());
            }
            
            // Animation succès
            pinInputs.forEach(input => input.classList.add('success'));
            document.getElementById('loginContainer').classList.add('success');
            
            // Redirection
            setTimeout(() => {
                redirigerVersApp();
            }, 1000);
        }
        
        function connexionEchouee() {
            tentatives++;
            localStorage.setItem('pic_tentatives', tentatives.toString());
            
            // Animation erreur
            pinInputs.forEach(input => {
                input.classList.add('error');
                input.value = '';
            });
            pinInputs[0].focus();
            
            // Vérifier blocage
            if (tentatives >= CONFIG.MAX_TENTATIVES) {
                blocageJusqua = Date.now() + (CONFIG.DUREE_BLOCAGE_MINUTES * 60 * 1000);
                localStorage.setItem('pic_blocage', blocageJusqua.toString());
                afficherErreur(`Trop de tentatives. Compte bloqué ${CONFIG.DUREE_BLOCAGE_MINUTES} min.`);
                desactiverFormulaire();
            } else {
                const restantes = CONFIG.MAX_TENTATIVES - tentatives;
                afficherErreur('Code incorrect. Veuillez réessayer.');
                
                if (restantes <= 2) {
                    document.getElementById('attemptsWarning').classList.add('show');
                    document.getElementById('attemptsText').textContent = 
                        `Plus que ${restantes} tentative${restantes > 1 ? 's' : ''}`;
                }
            }
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // HELPERS
        // ══════════════════════════════════════════════════════════════════════════════
        
        function afficherErreur(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            errorDiv.classList.add('show');
        }
        
        function resetErrors() {
            pinInputs.forEach(input => input.classList.remove('error'));
            document.getElementById('errorMessage').classList.remove('show');
        }
        
        function desactiverFormulaire() {
            pinInputs.forEach(input => input.disabled = true);
            document.getElementById('btnLogin').disabled = true;
            document.querySelectorAll('.key-btn').forEach(btn => btn.disabled = true);
        }
        
        function redirigerVersApp() {
            window.location.href = CONFIG.PAGE_DESTINATION;
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════════════════════════════════════
        
        document.addEventListener('DOMContentLoaded', () => {
            verifierConnexionExistante();
            
            // Afficher avertissement si tentatives > 0
            if (tentatives > 0 && tentatives < CONFIG.MAX_TENTATIVES) {
                const restantes = CONFIG.MAX_TENTATIVES - tentatives;
                if (restantes <= 2) {
                    document.getElementById('attemptsWarning').classList.add('show');
                    document.getElementById('attemptsText').textContent = 
                        `Plus que ${restantes} tentative${restantes > 1 ? 's' : ''}`;
                }
            }
        });
    </script>

</body>
</html>
